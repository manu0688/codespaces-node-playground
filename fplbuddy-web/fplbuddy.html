<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FPLBuddy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0d0d0d; color: #e0e0e0; min-height: 100vh; }

    header {
      background: #1a1a2e;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #00d4aa;
    }
    header h1 { font-size: 1.5rem; color: #00d4aa; letter-spacing: 1px; }
    header span { font-size: 0.8rem; color: #666; }

    .container { max-width: 1000px; margin: 36px auto; padding: 0 20px; }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #00d4aa;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e1e1e;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tab {
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #333;
      background: #141414;
      color: #666;
      transition: all 0.2s;
    }

    .tab:hover {
      border-color: #00d4aa55;
      color: #aaa;
    }

    .tab.active {
      background: #00d4aa;
      color: #0d0d0d;
      border-color: #00d4aa;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
      margin-bottom: 48px;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 18px 20px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #00d4aa55; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .team-name {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .team-name img {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .player-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .player-photo {
      width: 48px;
      height: 60px;
      object-fit: cover;
      border-radius: 8px;
      background: #1e1e1e;
      flex-shrink: 0;
    }

    .player-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .player-name {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .player-team-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      color: #888;
    }

    .player-team-row img {
      width: 16px;
      height: 16px;
      object-fit: contain;
    }

    .badge { padding: 3px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; }
    .easy   { background: #0a2e20; color: #00d4aa; }
    .medium { background: #2e2000; color: #f0a500; }
    .hard   { background: #2e0a0a; color: #ff5555; }

    .pos-badge { padding: 3px 10px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; background: #1a1a2e; color: #00d4aa; }

    .difficulty { font-size: 0.78rem; color: #666; margin-bottom: 10px; }

    .player-stat { font-size: 0.78rem; color: #888; margin-bottom: 4px; }
    .player-stat span { color: #e0e0e0; font-weight: 600; }

    .fixtures { display: flex; gap: 6px; flex-wrap: wrap; }
    .fix-chip {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      background: #1e1e1e;
      color: #aaa;
    }
    .fix-1 { background: #0a2e20; color: #00d4aa; }
    .fix-2 { background: #0a2e20; color: #00d4aa; }
    .fix-3 { background: #2e2000; color: #f0a500; }
    .fix-4 { background: #2e1500; color: #ff8c00; }
    .fix-5 { background: #2e0a0a; color: #ff5555; }

    .loading { text-align: center; padding: 60px; color: #444; font-size: 0.9rem; }
    .error-msg { text-align: center; padding: 40px; color: #ff5555; font-size: 0.85rem; }

    .gw-badge {
      background: #1a1a2e;
      border: 1px solid #00d4aa33;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.8rem;
      color: #00d4aa;
      margin-bottom: 24px;
      display: inline-block;
    }

    /* ---- AI CHAT STYLES ---- */
    .chat-container { max-width: 720px; }

    .api-key-box {
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }

    .api-key-box label {
      display: block;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .api-key-row { display: flex; gap: 10px; }

    .api-key-input {
      flex: 1;
      padding: 10px 14px;
      background: #0d0d0d;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .api-key-input:focus { border-color: #00d4aa55; }

    .btn-connect {
      padding: 10px 20px;
      background: #00d4aa;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-connect:hover { background: #00b894; }

    #key-status { font-size: 0.75rem; margin-top: 8px; color: #555; }

    .chat-window {
      background: #141414;
      border: 1px solid #222;
      border-radius: 10px;
      height: 380px;
      overflow-y: auto;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-empty {
      color: #444;
      text-align: center;
      margin: auto;
      font-size: 0.85rem;
      line-height: 1.8;
    }

    .msg-row { display: flex; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .msg-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.85rem;
      line-height: 1.6;
    }
    .msg-row.user .msg-bubble {
      background: #00d4aa;
      color: #0d0d0d;
      border-bottom-right-radius: 4px;
    }
    .msg-row.assistant .msg-bubble {
      background: #1e1e2e;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a2a3e;
    }

    .chat-input-row { display: flex; gap: 10px; }

    .chat-input {
      flex: 1;
      padding: 12px 14px;
      background: #141414;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input:focus { border-color: #00d4aa55; }

    .btn-send {
      padding: 12px 20px;
      background: #00d4aa;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-send:hover { background: #00b894; }
    .btn-send:disabled { background: #1e1e1e; color: #444; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>⚽ FPLBuddy</h1>
  <span id="last-updated">Loading live data...</span>
</header>

<div class="container">
  <div id="gw-info"></div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('fixtures', event)">📅 Fixture Runs</button>
    <button class="tab" onclick="switchTab('players', event)">⚡ Top Players</button>
    <button class="tab" onclick="switchTab('ai-chat', event)">🤖 AI Chat</button>
  </div>

  <p class="section-title" id="section-label">Best Fixture Runs — Next 5 Gameweeks</p>

  <!-- FIXTURES TAB -->
  <div id="fixtures-section">
    <div class="card-grid" id="fixture-cards">
      <div class="loading">Fetching live FPL data...</div>
    </div>
  </div>

  <!-- PLAYERS TAB -->
  <div id="players-section" style="display:none;">
    <div class="card-grid" id="player-cards">
      <div class="loading">Loading players...</div>
    </div>
  </div>

  <!-- AI CHAT TAB -->
  <div id="ai-chat-section" style="display:none;">
    <div class="chat-container">

      <!-- API Key Box -->
      <div class="api-key-box">
        <label>🔑 OpenAI API Key — stays in your browser only, never saved</label>
        <div class="api-key-row">
          <input type="password" id="api-key-input" class="api-key-input" placeholder="sk-..." />
          <button class="btn-connect" onclick="saveKey()">Connect</button>
        </div>
        <p id="key-status">Enter your key to enable AI-powered FPL advice.</p>
      </div>

      <!-- Chat Window -->
      <div class="chat-window" id="chat-window">
        <div class="chat-empty" id="chat-empty">
          🤖 Ask me anything FPL!<br>
          <span style="color:#333;">e.g. "Who should I captain this week?"<br>"Best budget midfielder right now?"</span>
        </div>
      </div>

      <!-- Input Row -->
      <div class="chat-input-row">
        <input
          type="text"
          id="chat-input"
          class="chat-input"
          placeholder="Ask an FPL question..."
          onkeydown="if(event.key==='Enter') sendMessage()" />
        <button class="btn-send" id="send-btn" onclick="sendMessage()">Send ➤</button>
      </div>

    </div>
  </div>

</div>

<script>
  const PROXY = 'https://corsproxy.io/?';
  const FPL_BOOTSTRAP = PROXY + encodeURIComponent('https://fantasy.premierleague.com/api/bootstrap-static/');
  const FPL_FIXTURES  = PROXY + encodeURIComponent('https://fantasy.premierleague.com/api/fixtures/');

  let fplData = null;
  let openaiKey = '';

  async function fetchJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error('Failed: ' + url);
    return res.json();
  }

  function diffClass(d) {
    if (d <= 2) return 'fix-1';
    if (d === 3) return 'fix-3';
    if (d === 4) return 'fix-4';
    return 'fix-5';
  }

  function badgeClass(avg) {
    if (avg <= 2.6) return 'easy';
    if (avg <= 3.2) return 'medium';
    return 'hard';
  }

  function badgeLabel(avg) {
    if (avg <= 2.6) return 'Easy run';
    if (avg <= 3.2) return 'Moderate';
    return 'Tough run';
  }

  function positionName(elementType) {
    const map = { 1: 'GKP', 2: 'DEF', 3: 'MID', 4: 'FWD' };
    return map[elementType] || '?';
  }

  function switchTab(tab, e) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');

    document.getElementById('fixtures-section').style.display = 'none';
    document.getElementById('players-section').style.display = 'none';
    document.getElementById('ai-chat-section').style.display = 'none';

    if (tab === 'fixtures') {
      document.getElementById('fixtures-section').style.display = 'block';
      document.getElementById('section-label').textContent = 'Best Fixture Runs — Next 5 Gameweeks';
    } else if (tab === 'players') {
      document.getElementById('players-section').style.display = 'block';
      document.getElementById('section-label').textContent = 'Top Players By Form';
      renderPlayers();
    } else {
      document.getElementById('ai-chat-section').style.display = 'block';
      document.getElementById('section-label').textContent = 'AI-Powered FPL Assistant';
    }
  }

  function renderPlayers() {
    const grid = document.getElementById('player-cards');
    if (!fplData) {
      grid.innerHTML = '<div class="loading">Data not loaded yet...</div>';
      return;
    }

    const { elements, teams } = fplData;

    const sorted = [...elements]
      .filter(p => p.minutes > 0)
      .sort((a, b) => parseFloat(b.form) - parseFloat(a.form))
      .slice(0, 12);

    grid.innerHTML = '';
    sorted.forEach(p => {
      const team = teams.find(t => t.id === p.team);
      const teamName = team ? team.name : '?';
      const teamCode = team ? team.code : '';
      const pos = positionName(p.element_type);
      const price = '£' + (p.now_cost / 10).toFixed(1) + 'm';

      grid.innerHTML += `
        <div class="card">
          <div class="card-header">
            <div class="player-header">
              <img
                class="player-photo"
                src="https://resources.premierleague.com/premierleague/photos/players/110x140/p${p.code}.png"
                alt="${p.first_name} ${p.second_name}"
                onerror="this.src='https://resources.premierleague.com/premierleague/photos/players/110x140/Photo-Missing.png'">
              <div class="player-info">
                <div class="player-name">${p.first_name} ${p.second_name}</div>
                <div class="player-team-row">
                  <img
                    src="https://resources.premierleague.com/premierleague/badges/50/t${teamCode}.png"
                    alt="${teamName}"
                    onerror="this.style.display='none'">
                  ${teamName}
                </div>
              </div>
            </div>
            <span class="pos-badge">${pos}</span>
          </div>
          <div class="player-stat">Price: <span>${price}</span></div>
          <div class="player-stat">Form: <span>${p.form}</span></div>
          <div class="player-stat">Total pts: <span>${p.total_points}</span></div>
          <div class="player-stat">Goals: <span>${p.goals_scored}</span></div>
          <div class="player-stat">Assists: <span>${p.assists}</span></div>
          <div class="player-stat">Selected by: <span>${p.selected_by_percent}%</span></div>
        </div>`;
    });
  }

  // ---- AI CHAT ----
  function saveKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val.startsWith('sk-')) {
      document.getElementById('key-status').textContent = '❌ Invalid key — should start with sk-';
      document.getElementById('key-status').style.color = '#ff5555';
      return;
    }
    openaiKey = val;
    document.getElementById('key-status').textContent = '✅ Connected! Ask me your FPL questions below.';
    document.getElementById('key-status').style.color = '#00d4aa';
    document.getElementById('chat-input').focus();
  }

  function addMessage(role, text) {
    const empty = document.getElementById('chat-empty');
    if (empty) empty.remove();

    const win = document.getElementById('chat-window');
    const row = document.createElement('div');
    row.className = 'msg-row ' + role;
    row.innerHTML = `<div class="msg-bubble">${text}</div>`;
    win.appendChild(row);
    win.scrollTop = win.scrollHeight;
    return row;
  }

  async function sendMessage() {
    if (!openaiKey) {
      alert('Please enter and connect your OpenAI API key first!');
      return;
    }
    const input = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const userMsg = input.value.trim();
    if (!userMsg) return;

    input.value = '';
    sendBtn.disabled = true;
    sendBtn.textContent = '...';

    addMessage('user', userMsg);
    const thinkingRow = addMessage('assistant', '⏳ Thinking...');

    try {
      const res = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${openaiKey}`
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            {
              role: 'system',
              content: 'You are an expert Fantasy Premier League (FPL) assistant. Give concise, tactical, and data-driven advice on transfers, captaincy picks, team selection, and fixture analysis. Keep responses under 180 words. Use bullet points where helpful.'
            },
            { role: 'user', content: userMsg }
          ],
          max_tokens: 250
        })
      });

      const data = await res.json();
      thinkingRow.remove();

      if (data.error) {
        addMessage('assistant', '❌ API Error: ' + data.error.message);
      } else {
        addMessage('assistant', data.choices[0].message.content.replace(/\n/g, '<br>'));
      }
    } catch (err) {
      thinkingRow.remove();
      addMessage('assistant', '❌ Network error. Check your API key and internet connection.');
    } finally {
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send ➤';
      input.focus();
    }
  }

  async function init() {
    const grid = document.getElementById('fixture-cards');
    try {
      const [bootstrap, allFixtures] = await Promise.all([
        fetchJSON(FPL_BOOTSTRAP),
        fetchJSON(FPL_FIXTURES)
      ]);

      fplData = bootstrap;

      const teams = bootstrap.teams;
      const events = bootstrap.events;
      const currentGW = events.find(e => e.is_current) || events.find(e => e.is_next) || events[0];
      const gwId = currentGW.id;

      document.getElementById('last-updated').textContent = 'Live data · GW' + gwId;
      document.getElementById('gw-info').innerHTML =
        `<div class="gw-badge">📅 Gameweek ${gwId} — ${currentGW.name}</div>`;

      const upcomingGWs = [gwId, gwId+1, gwId+2, gwId+3, gwId+4];
      const relevantFixtures = allFixtures.filter(f => upcomingGWs.includes(f.event));

      const teamFixtures = {};
      teams.forEach(t => { teamFixtures[t.id] = []; });

      relevantFixtures.forEach(f => {
        teamFixtures[f.team_h].push({ opp: f.team_a, difficulty: f.team_h_difficulty, venue: 'H' });
        teamFixtures[f.team_a].push({ opp: f.team_h, difficulty: f.team_a_difficulty, venue: 'A' });
      });

      const scored = teams.map(t => {
        const fixtures = teamFixtures[t.id].slice(0, 5);
        if (fixtures.length === 0) return null;
        const avg = fixtures.reduce((s, f) => s + f.difficulty, 0) / fixtures.length;
        return { team: t, fixtures, avg: Math.round(avg * 100) / 100 };
      }).filter(Boolean);

      scored.sort((a, b) => a.avg - b.avg);
      const top = scored.slice(0, 12);

      grid.innerHTML = '';
      top.forEach(({ team, fixtures, avg }) => {
        const chips = fixtures.map(f => {
          const oppTeam = teams.find(t => t.id === f.opp);
          const oppName = oppTeam ? oppTeam.short_name : '?';
          return `<span class="fix-chip ${diffClass(f.difficulty)}">${oppName} (${f.venue})</span>`;
        }).join('');

        grid.innerHTML += `
          <div class="card">
            <div class="card-header">
              <div class="team-name">
                <img
                  src="https://resources.premierleague.com/premierleague/badges/50/t${team.code}.png"
                  alt="${team.name}"
                  onerror="this.style.display='none'">
                ${team.name}
              </div>
              <span class="badge ${badgeClass(avg)}">${badgeLabel(avg)}</span>
            </div>
            <div class="difficulty">Avg difficulty: ${avg}</div>
            <div class="fixtures">${chips}</div>
          </div>`;
      });

    } catch (err) {
      grid.innerHTML = `<div class="error-msg">Could not load FPL data.<br><small>${err.message}</small></div>`;
      console.error(err);
    }
  }

  init();
</script>

</body>
</html>
